# LangBot 配置文件示例
# 请根据实际情况修改配置

# 服务器配置
server:
  host: "0.0.0.0"          # 监听地址
  port: 5300               # 监听端口
  debug: false             # 调试模式

# 日志配置
logging:
  level: "INFO"            # 日志级别: DEBUG, INFO, WARNING, ERROR
  file: "logs/langbot.log" # 日志文件路径

# 数据库配置
database:
  type: "sqlite"           # 数据库类型: sqlite, postgresql, mysql
  path: "data/langbot.db"  # 数据库文件路径

# 代理配置（国内用户推荐）
proxy:
  enabled: false
  http_proxy: ""           # HTTP 代理地址
  https_proxy: ""          # HTTPS 代理地址

# 默认模型配置
models:
  default_provider: "openai"
  default_model: "gpt-3.5-turbo"

# 语言设置
language: "zh-CN"

# 时区设置
timezone: "Asia/Shanghai"

# OneBot 配置（Docker 部署时使用）
onebot:
  enabled: true
  port_start: 2280
  port_end: 2290
